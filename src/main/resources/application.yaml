spring:
  application:
    name: snaplink-pro
  profiles:
    active: ${PROFILE}

  datasource:
    url: ${DB_URL}
    username:  ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      indent-output: true

  data:
    redis:
      port: 6379

server:
  port: 8080

jwt:
  secret: ${SECRET}
  expiration: 86400000

logging:
  level:
    org.springframework.security: DEBUG