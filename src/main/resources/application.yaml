spring:
  application:
    name: snaplink-pro
  profiles:
    active: ${PROFILE:dev}

  datasource:
    url: ${DB_URL}
    username:  ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      indent-output: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:dev-secret-key-dev-secret-key-dev-secret-key-dev-secret-key}
  expiration: ${JWT_EXPIRATION:3600000}

logging:
  level:
    org.springframework.security: DEBUG