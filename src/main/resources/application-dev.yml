spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/snaplink}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:dGVzdC1zZWNyZXQta2V5LXRlc3Qtc2VjcmV0LWtleS10ZXN0LXNlY3JldC1rZXktZm9yLWp3dA==}
  expiration: ${JWT_EXPIRATION:3600000}

logging:
  level:
    org.springframework.security: DEBUG

app:
  base-url: http://localhost:8080